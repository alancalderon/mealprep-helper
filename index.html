<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Familiar - Meal Prep Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

        :root{
            /* Tech palette (light) */
            --neon:#2563eb;   /* electric blue */
            --neon2:#06b6d4;  /* cyan */
            --violet:#7c3aed; /* violet */
            --danger:#ff3b3b;
            --ink:#0b1220;
            --muted:#475569;
            --bg:#f6f7fb;
            --surface: rgba(255,255,255,0.82);
        }

        html, body { height: 100%; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
        }

        .neon-accent{
            color: var(--neon);
            text-shadow: 0 0 18px rgba(37,99,235,0.15);
        }

        .neon-border{
            border-color: rgba(37,99,235,0.22);
            box-shadow: 0 0 0 1px rgba(37,99,235,0.14), 0 12px 32px rgba(2,6,23,0.10);
        }

        .card-surface{
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(2,6,23,0.08);
            box-shadow: 0 10px 24px rgba(2,6,23,0.06);
        }

        .danger-badge{
            background: rgba(255,59,59,0.08);
            border: 1px solid rgba(255,59,59,0.25);
            box-shadow: 0 10px 24px rgba(255,59,59,0.10);
            color:#7f1d1d;
        }

        .tech-chip{
            background: rgba(37,99,235,0.08);
            border: 1px solid rgba(37,99,235,0.18);
            color: rgba(37,99,235,0.95);
        }

        .tech-chip-2{
            background: rgba(6,182,212,0.10);
            border: 1px solid rgba(6,182,212,0.22);
            color: rgba(6,182,212,0.95);
        }
    </style>
</head>
<body class="min-h-screen pb-24">
    <div id="root"></div>

    <script type="text/babel">
        // Fallback local: se usa solo si no se puede leer mealPrep.json (ejemplo: file://).
        const mealPrepFallback = {
          "version": "2026.04",
          "couple": {
            "Alan": {

            },

          },
          "meal_options": [
            {

              },
              "weigh_plan": {

                ],
                "Michelle": [
                  { "label": "Carne (cocida)", "amount": 193, "unit": "g", "equiv": { "p": 56 } },
                  { "label": "Pasta/Papa (cocida)", "amount": 230, "unit": "g", "equiv": { "c": 52 } }
                ]
              }
            },
            {

              "name": "Pollo con Arroz o Camote",
              "description": "Pechuga de pollo con arroz blanco o camote al vapor",
              "ingredients": ["Pechuga de pollo", "Arroz/Camote", "Mantequilla/Oliva"],
              "biohacking_note": "Enfriar carbos 12h antes para crear almidón resistente.",
              "macros_est": {
                "Alan": { "kcal": 810, "p": 64, "c": 100, "f": 18 },
                "Michelle": { "kcal": 730, "p": 70, "c": 72, "f": 14 }
              },
              "weigh_plan": {
                "Alan": [
                  { "label": "Pollo (cocido)", "amount": 206, "unit": "g", "equiv": { "p": 64 } },
                  { "label": "Arroz/Camote (cocido)", "amount": 350, "unit": "g", "equiv": { "c": 100 } }
                ],
                "Michelle": [
                  { "label": "Pollo (cocido)", "amount": 226, "unit": "g", "equiv": { "p": 70 } },
                  { "label": "Arroz/Camote (cocido)", "amount": 230, "unit": "g", "equiv": { "c": 72 } }
                ]
              }
            },
            {
              "id": 3,
              "name": "Sourdough Snack",
              "description": "Pan de masa madre (24h fermento) con mantequilla",
              "alan_portion": "160g pan + 35g mantequilla",
              "michelle_portion": "120g pan + 25g mantequilla",
              "macros_est": {
                "Alan": { "kcal": 850, "p": 18, "c": 100, "f": 40 },
                "Michelle": { "kcal": 690, "p": 14, "c": 86, "f": 32 }
              },
              "weigh_plan": {
                "Alan": [
                  { "label": "Pan sourdough", "amount": 160, "unit": "g", "equiv": { "c": 100 } },
                  { "label": "Mantequilla", "amount": 35, "unit": "g", "equiv": { "f": 40 } }
                ],
                "Michelle": [
                  { "label": "Pan sourdough", "amount": 120, "unit": "g", "equiv": { "c": 86 } },
                  { "label": "Mantequilla", "amount": 25, "unit": "g", "equiv": { "f": 32 } }
                ]
              }
            },
            {
              "id": 4,
              "name": "Yogurt & Apple Bowl (Michelle Swap)",
              "description": "Intercambio de snack para Michelle",
              "michelle_portion": "200g Yogurt Griego + 1 Manzana + Canela + 60g Pan",
              "note": "Alta saciedad y salud intestinal.",
              "macros_est": {
                "Michelle": { "kcal": 520, "p": 26, "c": 62, "f": 18 }
              },
              "weigh_plan": {
                "Michelle": [
                  { "label": "Yogurt griego", "amount": 200, "unit": "g", "equiv": { "p": 26 } },
                  { "label": "Pan", "amount": 60, "unit": "g", "equiv": { "c": 62 } },
                  { "label": "Manzana", "amount": 1, "unit": "pza", "equiv": { "f": 18 } }
                ]
              }
            }
          ],
          "recovery_stack": {
            "nightly": ["Magnesio Glicinato", "Ashwagandha", "Melena de León"],
            "physical": ["Sauna 20min", "Cold Plunge 3min"]
          }
        };

        const clampRound = (n) => Math.round(Number.isFinite(n) ? n : 0);
        const clamp = (n, min, max) => Math.max(min, Math.min(max, n));

        // Datos para cálculos del "mínimo" y del gasto estimado LISS.
        // (Se basan en la info que compartiste: peso / estatura / SMM)
        const trainingProfiles = {
          Alan: { weightKg: 105.5, heightCm: 180, smmKg: 46.1 },
          Michelle: { weightKg: 73, heightCm: 165, smmKg: 27 },
        };

        function leanFactor(weightKg, heightCm, smmKg) {
          const leanRatio = smmKg / weightKg; // fracción de masa magra
          const heightM = heightCm / 100;
          // Ajuste heurístico: más lean mass y mayor estatura => ligeramente más gasto a igual MET.
          const adj = (leanRatio - 0.40) * 0.35 + (heightM - 1.70) * 0.05;
          return clamp(1 + adj, 0.88, 1.12);
        }

        function estimateStrengthKcal(sets, reps, rir, training) {
          const safeSets = Math.max(0, Number(sets) || 0);
          const safeReps = clamp(Number(reps) || 0, 1, 30);
          const safeRir = clamp(Number(rir) || 0, 0, 5);

          // Duración por set (trabajo) y descanso aproximado según reps/RIR.
          const workMinPerSet = 0.30 + safeReps * 0.045;
          const restMinPerSet = clamp(0.9 + (3 - safeRir) * 0.35, 0.6, 2.2);
          const totalMinutes = safeSets * (workMinPerSet + restMinPerSet);

          // MET de pesas ajustado por cercanía al fallo (RIR), rango de reps y composición corporal.
          const leanRatio = training.smmKg / training.weightKg;
          const metBase = 4.4;
          const rirAdj = (3 - safeRir) * 0.45;
          const repsAdj = safeReps <= 6 ? 0.7 : safeReps <= 12 ? 0.35 : 0.1;
          const leanAdj = (leanRatio - 0.38) * 1.4;
          const metStrength = clamp(metBase + rirAdj + repsAdj + leanAdj, 3.8, 7.2);

          return metStrength * training.weightKg * (totalMinutes / 60);
        }

        function estimateLissKcal(lissMinutes, metLiss, weightKg, heightCm, smmKg) {
          const MET_liss = clamp(Number(metLiss) || 3.2, 2.0, 6.0);
          const factor = leanFactor(weightKg, heightCm, smmKg);
          return MET_liss * factor * weightKg * (lissMinutes / 60);
        }

        function estimateLissMinutesForTarget(targetKcal, sets, reps, rir, metLiss, training) {
          const strengthKcal = estimateStrengthKcal(sets, reps, rir, training);
          const MET_liss = clamp(Number(metLiss) || 3.2, 2.0, 6.0);
          const factor = leanFactor(training.weightKg, training.heightCm, training.smmKg);
          const kcalPerMin = MET_liss * factor * training.weightKg / 60;
          const remaining = targetKcal - strengthKcal;
          if (remaining <= 0) return 0;
          return remaining / kcalPerMin;
        }

        function formatEquiv(equiv) {
          if (!equiv) return "";
          const parts = [];
          if (Number.isFinite(equiv.kcal)) parts.push(`${equiv.kcal} kcal`);
          if (Number.isFinite(equiv.p)) parts.push(`${equiv.p}g P`);
          if (Number.isFinite(equiv.c)) parts.push(`${equiv.c}g C`);
          if (Number.isFinite(equiv.f)) parts.push(`${equiv.f}g F`);
          return parts.join(" | ");
        }

        function digitsOnly(value) {
          return String(value ?? "").replace(/[^\d]/g, "");
        }

        function decimalOnly(value) {
          const cleaned = String(value ?? "").replace(/[^\d.]/g, "");
          const firstDot = cleaned.indexOf(".");
          if (firstDot === -1) return cleaned;
          return cleaned.slice(0, firstDot + 1) + cleaned.slice(firstDot + 1).replace(/\./g, "");
        }

        function SegmentedToggle({ value, onChange, options = ["Alan", "Michelle"] }) {
          return (
            <div className="card-surface rounded-2xl p-1 flex gap-1">
              {options.map((opt) => {
                const active = opt === value;
                return (
                  <button
                    key={opt}
                    onClick={() => onChange(opt)}
                    className={[
                      "flex-1 text-sm md:text-base rounded-xl py-3 font-bold transition",
                      active
                        ? "neon-accent bg-[rgba(37,99,235,0.10)] neon-border border border-[rgba(37,99,235,0.22)]"
                        : "bg-white/70 border border-transparent hover:border-[rgba(2,6,23,0.14)] text-slate-700",
                    ].join(" ")}
                    aria-pressed={active}
                  >
                    {opt}
                  </button>
                );
              })}
            </div>
          );
        }

        function MacroChips({ macros }) {
          if (!macros) return null;
          return (
            <div className="flex flex-wrap gap-2">
              <span className="px-2.5 py-1 rounded-full border border-slate-200 bg-white text-slate-700 text-[11px] font-extrabold">
                {macros.kcal} kcal
              </span>
              <span className="px-2.5 py-1 rounded-full tech-chip text-[11px] font-extrabold">
                {macros.p}g P
              </span>
              <span className="px-2.5 py-1 rounded-full tech-chip-2 text-[11px] font-extrabold">
                {macros.c}g C
              </span>
              <span className="px-2.5 py-1 rounded-full border border-[rgba(124,58,237,0.22)] bg-[rgba(124,58,237,0.08)] text-[11px] font-extrabold" style={{ color: "var(--violet)" }}>
                {macros.f}g F
              </span>
            </div>
          );
        }

        function ProfilePortionBlock({ profileKey, mealOption }) {
          const macrosEst = mealOption?.macros_est?.[profileKey] || null;
          const weighItems = mealOption?.weigh_plan?.[profileKey] || null;
          const portionText = profileKey === "Alan" ? mealOption.alan_portion : mealOption.michelle_portion;

          const titleStyles =
            profileKey === "Alan"
              ? "text-slate-900"
              : "text-slate-900";

          return (
            <div className="rounded-2xl border border-slate-200 bg-white/75 p-3 md:p-4">
              <div className="flex items-start justify-between gap-3">
                <div>
                  <div className={["text-base md:text-lg font-extrabold", titleStyles].join(" ")}>
                    {profileKey}
                  </div>
                  <div className="text-xs uppercase tracking-widest text-slate-500 font-bold mt-1">
                    Porciones para pesar (rápido)
                  </div>
                </div>
                <MacroChips macros={macrosEst} />
              </div>

              {Array.isArray(weighItems) && weighItems.length > 0 ? (
                <div className="mt-3 grid grid-cols-1 gap-2">
                  {weighItems.map((it) => (
                    <div
                      key={`${profileKey}-${it.label}-${it.amount}${it.unit}`}
                      className="rounded-2xl border border-slate-200 bg-white p-3"
                    >
                      <div className="flex items-center justify-between gap-3">
                        <div className="text-sm md:text-base font-extrabold text-slate-800">{it.label}</div>
                        <div className="text-xs uppercase tracking-widest text-slate-500 font-bold">PESA</div>
                      </div>
                      <div className="mt-1.5 text-3xl md:text-4xl font-black leading-none text-slate-900">
                        {it.amount}
                        <span className="text-sm md:text-base font-black ml-1.5 text-slate-700">{it.unit}</span>
                      </div>
                      {it.equiv ? (
                        <div className="text-xs md:text-sm text-slate-700 mt-1.5 font-bold">
                          Equivale a <span className="neon-accent font-extrabold">{formatEquiv(it.equiv)}</span>
                        </div>
                      ) : null}
                    </div>
                  ))}
                </div>
              ) : (
                <div className="mt-4 rounded-2xl border border-slate-200 bg-white p-4 text-slate-700 font-bold">
                  Sin porciones definidas para {profileKey}.
                </div>
              )}

              {portionText ? (
                <div className="mt-4 rounded-2xl bg-slate-50 border border-slate-200 p-4">
                  <div className="text-xs uppercase tracking-widest text-slate-500 font-bold">
                    Notas / porción detallada
                  </div>
                  <div className="text-base md:text-lg font-bold mt-1 text-slate-800">{portionText}</div>
                </div>
              ) : null}
            </div>
          );
        }

        function MealCardCompare({ mealOption, index }) {
          const hasAlan = !!mealOption?.weigh_plan?.Alan || !!mealOption?.macros_est?.Alan || !!mealOption?.alan_portion;
          const hasMichelle = !!mealOption?.weigh_plan?.Michelle || !!mealOption?.macros_est?.Michelle || !!mealOption?.michelle_portion;

          return (
            <article className="card-surface rounded-3xl p-3.5 md:p-4">
              <div className="flex items-center justify-between gap-3">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-2xl flex items-center justify-center font-black text-slate-900 tech-chip">
                    {index + 1}
                  </div>
                  <h3 className="text-xl md:text-2xl font-extrabold">{mealOption.name}</h3>
                </div>
              </div>

              <p className="text-base md:text-lg text-slate-700 mt-3">{mealOption.description}</p>

              <div className="mt-4 grid grid-cols-1 lg:grid-cols-2 gap-3">
                {hasAlan ? <ProfilePortionBlock profileKey="Alan" mealOption={mealOption} /> : null}
                {hasMichelle ? <ProfilePortionBlock profileKey="Michelle" mealOption={mealOption} /> : null}
              </div>

              {mealOption.biohacking_note ? (
                <details className="mt-3 rounded-2xl border border-[rgba(124,58,237,0.18)] bg-[rgba(124,58,237,0.04)] px-3 py-2">
                  <summary className="list-none cursor-pointer flex items-center justify-end gap-2 text-xs font-extrabold select-none" style={{ color: "var(--violet)" }}>
                    <span title="Ver nota bio-hacking">⚡ Bio-hacking</span>
                  </summary>
                  <div className="text-sm md:text-base mt-2 text-slate-700">{mealOption.biohacking_note}</div>
                </details>
              ) : null}

              {Array.isArray(mealOption.ingredients) && mealOption.ingredients.length > 0 ? (
                <div className="mt-4">
                  <div className="text-xs uppercase tracking-widest text-slate-500 font-bold">Ingredientes</div>
                  <div className="flex flex-wrap gap-2 mt-2">
                    {mealOption.ingredients.map((ing) => (
                      <span
                        key={ing}
                        className="px-3 py-2 rounded-2xl border border-[rgba(148,163,184,0.22)] bg-white/70 text-base text-slate-800"
                      >
                        {ing}
                      </span>
                    ))}
                  </div>
                </div>
              ) : null}

              {mealOption.note ? (
                <div className="mt-4 text-base md:text-lg text-slate-700">
                  <span className="font-extrabold neon-accent">Nota:</span> {mealOption.note}
                </div>
              ) : null}
            </article>
          );
        }

        // App principal con dos vistas: "Meal Prep" y "Ejercicio".
        function App() {
          const [screenView, setScreenView] = React.useState("Meal Prep");
          const [calcProfileKey, setCalcProfileKey] = React.useState("Alan");

          const [mealPrepData, setMealPrepData] = React.useState(mealPrepFallback);

          React.useEffect(() => {
            fetch("mealPrep.json")
              .then((r) => r.json())
              .then((data) => setMealPrepData(data))
              .catch(() => {
                // Si no se puede leer el JSON (por ejemplo, file://), usamos el fallback embebido.
              });
          }, []);

          const alanDaily = mealPrepData?.couple?.Alan?.daily_macros || {};
          const michelleDaily = mealPrepData?.couple?.Michelle?.daily_macros || {};
          const meals = mealPrepData.meal_options;

          const training = trainingProfiles[calcProfileKey];
          const minSets = clamp(Math.round(training.smmKg * 0.25), 4, 16);

          // Pesos de comida se leen de mealPrep.json → weigh_plan por comida/perfil.

          const [targetKcalInput, setTargetKcalInput] = React.useState("600");
          const [setsInput, setSetsInput] = React.useState(String(minSets));
          const [repsInput, setRepsInput] = React.useState("6");
          const [rirInput, setRirInput] = React.useState("2");
          const [lissMinutesInput, setLissMinutesInput] = React.useState("45");
          const [lissMetInput, setLissMetInput] = React.useState("3.2");

          const targetKcal = Number(targetKcalInput) || 0;
          const sets = Number(setsInput) || 0;
          const reps = Number(repsInput) || 0;
          const rir = Number(rirInput) || 0;
          const lissMinutes = Number(lissMinutesInput) || 0;
          const lissMet = Number(lissMetInput) || 0;

          React.useEffect(() => {
            const newMinSets = clamp(Math.round(trainingProfiles[calcProfileKey].smmKg * 0.25), 4, 16);
            setSetsInput(String(newMinSets));
            // Recomendación inicial para targetKcal manteniendo tus inputs como estimación.
            const rec = estimateLissMinutesForTarget(
              targetKcal,
              newMinSets,
              reps,
              rir,
              lissMet,
              trainingProfiles[calcProfileKey]
            );
            setLissMinutesInput(String(Math.max(0, Math.round(rec / 5) * 5)));
          }, [calcProfileKey]);

          const strengthKcal = estimateStrengthKcal(sets, reps, rir, training);
          const lissKcal = estimateLissKcal(lissMinutes, lissMet, training.weightKg, training.heightCm, training.smmKg);
          const totalKcal = strengthKcal + lissKcal;

          const kcalPerMinLiss = estimateLissKcal(1, lissMet, training.weightKg, training.heightCm, training.smmKg);

          const neededTo500 = Math.max(0, 500 - totalKcal);
          const neededTo700 = Math.max(0, totalKcal - 700);
          const targetNeededLissMinutes = Math.max(
            0,
            Math.ceil(((targetKcal - strengthKcal) / kcalPerMinLiss) / 5) * 5
          );

          const recForMinSets500 = Math.ceil(
            estimateLissMinutesForTarget(500, minSets, reps, rir, lissMet, training) / 5
          ) * 5;
          const recForMinSets700 = Math.ceil(
            estimateLissMinutesForTarget(700, minSets, reps, rir, lissMet, training) / 5
          ) * 5;

          return (
            <div className="min-h-screen">
              <div className="max-w-6xl mx-auto p-4 md:p-6 space-y-5">
                <header className="space-y-3">
                  <div className="flex flex-col md:flex-row md:items-start md:justify-between gap-3">
                    <div>
                      <div className="text-2xl md:text-3xl font-extrabold tracking-tight">
                        Meal Prep Helper
                      </div>
                      <div className="text-slate-600 text-sm md:text-base font-semibold mt-1">
                        Pesa <span className="neon-accent font-extrabold">(cocido)</span> • {mealPrepData.version}
                      </div>
                    </div>
                    <div className="max-w-sm">
                      <SegmentedToggle value={screenView} onChange={setScreenView} options={["Meal Prep", "Ejercicio"]} />
                    </div>
                  </div>

                  {screenView === "Meal Prep" ? (
                    <div className="card-surface neon-border rounded-3xl p-4 md:p-5">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div className="rounded-2xl border border-slate-200 bg-white/80 p-3">
                          <div className="text-xs uppercase tracking-widest text-slate-500 font-bold mb-2">Target diario Alan</div>
                          <div className="flex flex-wrap gap-2">
                            <span className="px-2.5 py-1 rounded-full border border-slate-200 bg-white text-slate-700 text-[11px] font-extrabold">{alanDaily.kcal} kcal</span>
                            <span className="px-2.5 py-1 rounded-full tech-chip text-[11px] font-extrabold">{alanDaily.p}g P</span>
                            <span className="px-2.5 py-1 rounded-full tech-chip-2 text-[11px] font-extrabold">{alanDaily.c}g C</span>
                            <span className="px-2.5 py-1 rounded-full border border-[rgba(124,58,237,0.22)] bg-[rgba(124,58,237,0.08)] text-[11px] font-extrabold" style={{ color: "var(--violet)" }}>{alanDaily.f}g F</span>
                          </div>
                        </div>
                        <div className="rounded-2xl border border-slate-200 bg-white/80 p-3">
                          <div className="text-xs uppercase tracking-widest text-slate-500 font-bold mb-2">Target diario Michelle</div>
                          <div className="flex flex-wrap gap-2">
                            <span className="px-2.5 py-1 rounded-full border border-slate-200 bg-white text-slate-700 text-[11px] font-extrabold">{michelleDaily.kcal} kcal</span>
                            <span className="px-2.5 py-1 rounded-full tech-chip text-[11px] font-extrabold">{michelleDaily.p}g P</span>
                            <span className="px-2.5 py-1 rounded-full tech-chip-2 text-[11px] font-extrabold">{michelleDaily.c}g C</span>
                            <span className="px-2.5 py-1 rounded-full border border-[rgba(124,58,237,0.22)] bg-[rgba(124,58,237,0.08)] text-[11px] font-extrabold" style={{ color: "var(--violet)" }}>{michelleDaily.f}g F</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  ) : null}

                </header>

                {screenView === "Meal Prep" ? (
                <section className="space-y-4">
                  {meals.map((mealOption, idx) => (
                    <MealCardCompare
                      key={mealOption.id}
                      mealOption={mealOption}
                      index={idx}
                    />
                  ))}
                </section>
                ) : (
                <section className="card-surface neon-border rounded-3xl p-4 md:p-5 space-y-4 mt-2">
                  <div className="flex items-baseline justify-between gap-4">
                    <h2 className="text-2xl md:text-3xl font-extrabold neon-accent">Cálculo de Ejercicio (RIR + MET)</h2>
                    <div className="text-slate-600 text-sm md:text-base font-semibold">
                      Estimación en kcal
                    </div>
                  </div>

                  <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                    <div className="text-slate-700 text-sm md:text-base font-bold">
                      Calculadora para:
                    </div>
                    <div className="max-w-xs">
                      <SegmentedToggle value={calcProfileKey} onChange={setCalcProfileKey} />
                    </div>
                  </div>

                  <div className="text-slate-600 text-sm md:text-base leading-relaxed">
                    Mínimo sugerido (heurística por SMM): <span className="neon-accent font-extrabold">{minSets}</span> sets/día. Para cubrirlo con un gasto total de <span className="font-extrabold">500–700 kcal/día</span> con LISS (MET {lissMet}), el rango aproximado es:{" "}
                    <span className="neon-accent font-extrabold">{recForMinSets500}–{recForMinSets700}</span> min/día.
                  </div>

                  <div className="rounded-2xl border border-slate-200 bg-white/80 p-3">
                    <div className="text-xs uppercase tracking-widest text-slate-500 font-bold mb-2">
                      Parámetros usados ({calcProfileKey})
                    </div>
                    <div className="flex flex-wrap gap-2">
                      <span className="px-2.5 py-1 rounded-full border border-slate-200 bg-white text-slate-700 text-[11px] font-extrabold">
                        Peso: {training.weightKg} kg
                      </span>
                      <span className="px-2.5 py-1 rounded-full border border-slate-200 bg-white text-slate-700 text-[11px] font-extrabold">
                        Estatura: {training.heightCm} cm
                      </span>
                      <span className="px-2.5 py-1 rounded-full border border-slate-200 bg-white text-slate-700 text-[11px] font-extrabold">
                        SMM: {training.smmKg} kg
                      </span>
                    </div>
                    <div className="text-xs text-slate-500 mt-2">
                      Estas variables afectan el gasto estimado en pesas (junto con sets/reps/RIR) y LISS (junto con MET y minutos).
                    </div>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div className="lg:col-span-2 space-y-4">
                      <div className="rounded-2xl border border-[rgba(148,163,184,0.22)] bg-white/60 p-4">
                        <div className="text-xs uppercase tracking-widest text-slate-500 font-bold">Calculadora</div>
                        <div className="mt-3 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                          <label className="block">
                            <div className="text-sm font-bold text-slate-700 mb-2">Sets</div>
                            <input
                              type="text"
                              inputMode="numeric"
                              value={setsInput}
                              onChange={(e) => setSetsInput(digitsOnly(e.target.value))}
                              className="w-full bg-white border border-slate-200 rounded-2xl px-4 py-3 text-slate-900 text-lg font-extrabold focus:outline-none focus:ring-2 focus:ring-[rgba(37,99,235,0.30)]"
                            />
                          </label>

                          <label className="block">
                            <div className="text-sm font-bold text-slate-700 mb-2">Reps por set</div>
                            <input
                              type="text"
                              inputMode="numeric"
                              value={repsInput}
                              onChange={(e) => setRepsInput(digitsOnly(e.target.value))}
                              className="w-full bg-white border border-slate-200 rounded-2xl px-4 py-3 text-slate-900 text-lg font-extrabold focus:outline-none focus:ring-2 focus:ring-[rgba(37,99,235,0.30)]"
                            />
                          </label>

                          <label className="block">
                            <div className="text-sm font-bold text-slate-700 mb-2">RIR promedio</div>
                            <input
                              type="text"
                              inputMode="numeric"
                              value={rirInput}
                              onChange={(e) => setRirInput(digitsOnly(e.target.value))}
                              className="w-full bg-white border border-slate-200 rounded-2xl px-4 py-3 text-slate-900 text-lg font-extrabold focus:outline-none focus:ring-2 focus:ring-[rgba(124,58,237,0.30)]"
                            />
                          </label>

                          <label className="block">
                            <div className="text-sm font-bold text-slate-700 mb-2">Minutos de LISS</div>
                            <input
                              type="text"
                              inputMode="numeric"
                              value={lissMinutesInput}
                              onChange={(e) => setLissMinutesInput(digitsOnly(e.target.value))}
                              className="w-full bg-white border border-slate-200 rounded-2xl px-4 py-3 text-slate-900 text-lg font-extrabold focus:outline-none focus:ring-2 focus:ring-[rgba(6,182,212,0.30)]"
                            />
                          </label>
                        </div>

                        <div className="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-3">
                          <label className="block">
                            <div className="text-sm font-bold text-slate-700 mb-2">MET promedio LISS</div>
                            <input
                              type="text"
                              inputMode="decimal"
                              value={lissMetInput}
                              onChange={(e) => setLissMetInput(decimalOnly(e.target.value))}
                              className="w-full bg-white border border-slate-200 rounded-2xl px-4 py-3 text-slate-900 text-lg font-extrabold focus:outline-none focus:ring-2 focus:ring-[rgba(6,182,212,0.30)]"
                            />
                          </label>
                          <div className="rounded-2xl border border-slate-200 bg-white/80 p-3">
                            <div className="text-xs uppercase tracking-widest text-slate-500 font-bold">Referencia MET LISS</div>
                            <div className="text-sm text-slate-700 mt-1 font-semibold">2.5 suave • 3.2 moderado • 4.0 rápido</div>
                          </div>
                        </div>

                        <div className="mt-3">
                          <div className="flex items-center justify-between gap-3">
                            <div className="text-sm font-bold text-slate-700">Objetivo kcal/día</div>
                            <div className="text-sm font-extrabold neon-accent">{targetKcal} kcal</div>
                          </div>
                          <input
                            type="text"
                            inputMode="numeric"
                            value={targetKcalInput}
                            onChange={(e) => setTargetKcalInput(digitsOnly(e.target.value))}
                            className="w-full mt-2 bg-white border border-slate-200 rounded-2xl px-4 py-3 text-slate-900 text-lg font-extrabold focus:outline-none focus:ring-2 focus:ring-[rgba(37,99,235,0.30)]"
                          />
                          <div className="text-xs text-slate-500 mt-1">
                            Estimación basada en MET, tiempo por set, descanso e intensidad (RIR).
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="rounded-2xl border border-[rgba(148,163,184,0.22)] bg-white/60 p-4 space-y-3 lg:col-span-1">
                      <div>
                        <div className="text-xs uppercase tracking-widest text-slate-500 font-bold">Resultado</div>
                        <div className="text-4xl font-extrabold neon-accent mt-2">
                          {Math.round(totalKcal)} <span className="text-lg font-black text-slate-700">kcal</span>
                        </div>
                      </div>

                      <div className="space-y-1">
                        <div className="flex items-center justify-between gap-3">
                          <span className="text-sm font-bold text-slate-700">Resistencia</span>
                          <span className="text-sm font-extrabold text-slate-900">{Math.round(strengthKcal)} kcal</span>
                        </div>
                        <div className="flex items-center justify-between gap-3">
                          <span className="text-sm font-bold text-slate-700">LISS</span>
                          <span className="text-sm font-extrabold text-slate-900">{Math.round(lissKcal)} kcal</span>
                        </div>
                      </div>

                      <div className="rounded-2xl bg-white/80 border border-slate-200 p-3">
                        {totalKcal < 500 ? (
                          <div className="text-slate-700 text-sm font-bold">
                            Faltan <span className="neon-accent font-extrabold">{Math.round(neededTo500)} kcal</span> para llegar a 500.
                          </div>
                        ) : totalKcal > 700 ? (
                          <div className="text-slate-700 text-sm font-bold">
                            Pasaste <span className="neon-accent font-extrabold">{Math.round(neededTo700)} kcal</span> del rango 700.
                          </div>
                        ) : (
                          <div className="text-slate-700 text-sm font-bold">
                            Estás dentro del rango <span className="neon-accent font-extrabold">500–700</span>.
                          </div>
                        )}
                        <div className="text-xs text-slate-500 mt-2">
                          Para tu objetivo (<span className="font-extrabold text-slate-700">{targetKcal}</span> kcal), LISS estimado:{" "}
                          <span className="font-extrabold neon-accent">{targetNeededLissMinutes}</span> min/día.
                        </div>
                      </div>
                    </div>
                  </div>
                </section>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
