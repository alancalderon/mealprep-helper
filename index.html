<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Familiar - Meal Prep Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen pb-20">

    <!-- Header -->
    <header class="p-6 border-b border-slate-200 bg-white/70 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
                Coach Familiar <span class="text-slate-400 font-light text-lg">| Meal Prep</span>
            </h1>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="relative w-full">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </span>
                    <input type="text" id="search-bar" placeholder="Buscar comida..." oninput="updateAll()" 
                        class="pl-10 pr-4 py-2 w-full md:w-64 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm">
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-6 space-y-8">

        <!-- Global Settings Section -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Alan Settings -->
            <div class="glass-card bg-white p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span> Perfil: Alan
                </h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Calorías Totales</label>
                        <input type="number" id="alan-cals" value="2400" onchange="updateAll()" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none font-medium">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Proteína (g)</label>
                        <input type="number" id="alan-prot" value="140" onchange="updateAll()" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none font-medium">
                    </div>
                </div>
            </div>

            <!-- Michelle Settings -->
            <div class="glass-card bg-white p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                    <span class="w-2 h-6 bg-rose-500 rounded-full"></span> Perfil: Michelle
                </h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Calorías Totales</label>
                        <input type="number" id="michelle-cals" value="2000" onchange="updateAll()" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 focus:ring-2 focus:ring-rose-500 outline-none font-medium">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Proteína (g)</label>
                        <input type="number" id="michelle-prot" value="140" onchange="updateAll()" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 focus:ring-2 focus:ring-rose-500 outline-none font-medium">
                    </div>
                </div>
            </div>
        </section>

        <!-- Meal Display Section -->
        <div id="meals-container" class="grid grid-cols-1 gap-10">
            <!-- Meals injected here -->
        </div>

    </main>

    <script>
        // Database de alimentos (Valores por 100g ya cocidos)
        const foodDatabase = [
            { id: 'beef', name: 'Carne Molida 88/12', type: 'protein', p: 26, f: 12, c: 0, cal: 215 },
            { id: 'chicken', name: 'Pechuga de Pollo', type: 'protein', p: 31, f: 3.6, c: 0, cal: 165 },
            { id: 'pasta', name: 'Pasta Bien Cocida', type: 'carb', p: 5, f: 1, c: 30, cal: 150 },
            { id: 'sweet_potato', name: 'Camote Cocido', type: 'carb', p: 2, f: 0, c: 20, cal: 90 },
            { id: 'sauce', name: 'Salsa de Tomate Nat.', type: 'extra', p: 1, f: 0, c: 4, cal: 20 }
        ];

        // Plantillas de comida
        const mealTemplates = [
            { 
                name: "Pasta Bolognese con Carne", 
                proteinId: 'beef', 
                carbId: 'pasta',
                extraId: 'sauce',
                extraQty: 125 
            },
            { 
                name: "Pollo con Camote al Horno", 
                proteinId: 'chicken', 
                carbId: 'sweet_potato',
                extraId: null,
                extraQty: 0
            },
            { 
                name: "Cena: Pasta con Carne Molida", 
                proteinId: 'beef', 
                carbId: 'pasta',
                extraId: null,
                extraQty: 0
            }
        ];

        function calculateMeal(totalCals, totalProt, template) {
            const mealCals = totalCals / 3;
            const mealProtTarget = totalProt / 3;

            const proteinFood = foodDatabase.find(f => f.id === template.proteinId);
            const carbFood = foodDatabase.find(f => f.id === template.carbId);
            const extraFood = template.extraId ? foodDatabase.find(f => f.id === template.extraId) : null;

            const proteinQty = (mealProtTarget / proteinFood.p) * 100;
            const proteinCals = (proteinQty / 100) * proteinFood.cal;
            const extraCals = extraFood ? (template.extraQty / 100) * extraFood.cal : 0;
            
            const remainingCals = mealCals - proteinCals - extraCals;
            const carbQty = (remainingCals / carbFood.cal) * 100;

            return {
                protein: { name: proteinFood.name, qty: Math.round(proteinQty) },
                carb: { name: carbFood.name, qty: Math.round(carbQty) },
                extra: extraFood ? { name: extraFood.name, qty: template.extraQty } : null,
                totalMealCals: Math.round(mealCals),
                totalMealProt: Math.round(mealProtTarget)
            };
        }

        function renderMeals() {
            const alanCals = parseFloat(document.getElementById('alan-cals').value) || 0;
            const alanProt = parseFloat(document.getElementById('alan-prot').value) || 0;
            const michelleCals = parseFloat(document.getElementById('michelle-cals').value) || 0;
            const michelleProt = parseFloat(document.getElementById('michelle-prot').value) || 0;
            const searchTerm = document.getElementById('search-bar').value.toLowerCase();

            const container = document.getElementById('meals-container');
            container.innerHTML = '';

            const filteredMeals = mealTemplates.filter(m => m.name.toLowerCase().includes(searchTerm));

            if (filteredMeals.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                        <p class="text-slate-400 font-medium">No se encontraron comidas que coincidan con tu búsqueda.</p>
                    </div>
                `;
                return;
            }

            filteredMeals.forEach((template, index) => {
                const alanMeal = calculateMeal(alanCals, alanProt, template);
                const michelleMeal = calculateMeal(michelleCals, michelleProt, template);

                const mealCard = `
                    <div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div class="flex items-center gap-3 mb-6 px-2">
                            <div class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold shadow-lg shadow-blue-200">
                                ${index + 1}
                            </div>
                            <h3 class="text-xl md:text-2xl font-bold text-slate-800 uppercase tracking-tight">
                                ${template.name}
                            </h3>
                        </div>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <!-- Alan Meal Card -->
                            <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-200 ring-1 ring-blue-500/5">
                                <div class="bg-blue-50/50 p-5 border-b border-slate-100 flex justify-between items-center">
                                    <div class="flex items-center gap-2">
                                        <div class="w-3 h-3 rounded-full bg-blue-500 animate-pulse"></div>
                                        <span class="font-bold text-blue-700 tracking-wide">ALAN</span>
                                    </div>
                                    <div class="flex gap-3">
                                        <span class="text-xs font-bold bg-white text-blue-600 px-3 py-1 rounded-full border border-blue-100 shadow-sm uppercase">${alanMeal.totalMealCals} kcal</span>
                                        <span class="text-xs font-bold bg-blue-600 text-white px-3 py-1 rounded-full shadow-sm uppercase">${alanMeal.totalMealProt}g Prot</span>
                                    </div>
                                </div>
                                <div class="p-8 space-y-5">
                                    <div class="group flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-transparent hover:border-blue-200 transition-all">
                                        <div>
                                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Proteína</p>
                                            <p class="font-bold text-slate-700 group-hover:text-blue-600 transition-colors">${alanMeal.protein.name}</p>
                                        </div>
                                        <div class="text-3xl font-black text-blue-600">${alanMeal.protein.qty}<span class="text-sm font-bold ml-1">g</span></div>
                                    </div>
                                    <div class="group flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-transparent hover:border-emerald-200 transition-all">
                                        <div>
                                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Carbohidrato</p>
                                            <p class="font-bold text-slate-700 group-hover:text-emerald-600 transition-colors">${alanMeal.carb.name}</p>
                                        </div>
                                        <div class="text-3xl font-black text-emerald-500">${alanMeal.carb.qty}<span class="text-sm font-bold ml-1">g</span></div>
                                    </div>
                                    ${alanMeal.extra ? `
                                    <div class="flex justify-between items-center p-4 bg-indigo-50/30 rounded-2xl border border-indigo-100">
                                        <div>
                                            <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1">Acompañamiento</p>
                                            <p class="font-bold text-slate-600">${alanMeal.extra.name}</p>
                                        </div>
                                        <div class="text-2xl font-bold text-indigo-500">${alanMeal.extra.qty}<span class="text-sm font-bold ml-1">g</span></div>
                                    </div>` : ''}
                                </div>
                            </div>

                            <!-- Michelle Meal Card -->
                            <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-200 ring-1 ring-rose-500/5">
                                <div class="bg-rose-50/50 p-5 border-b border-slate-100 flex justify-between items-center">
                                    <div class="flex items-center gap-2">
                                        <div class="w-3 h-3 rounded-full bg-rose-500 animate-pulse"></div>
                                        <span class="font-bold text-rose-700 tracking-wide">MICHELLE</span>
                                    </div>
                                    <div class="flex gap-3">
                                        <span class="text-xs font-bold bg-white text-rose-600 px-3 py-1 rounded-full border border-rose-100 shadow-sm uppercase">${michelleMeal.totalMealCals} kcal</span>
                                        <span class="text-xs font-bold bg-rose-600 text-white px-3 py-1 rounded-full shadow-sm uppercase">${michelleMeal.totalMealProt}g Prot</span>
                                    </div>
                                </div>
                                <div class="p-8 space-y-5">
                                    <div class="group flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-transparent hover:border-rose-200 transition-all">
                                        <div>
                                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Proteína</p>
                                            <p class="font-bold text-slate-700 group-hover:text-rose-600 transition-colors">${michelleMeal.protein.name}</p>
                                        </div>
                                        <div class="text-3xl font-black text-rose-500">${michelleMeal.protein.qty}<span class="text-sm font-bold ml-1">g</span></div>
                                    </div>
                                    <div class="group flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-transparent hover:border-emerald-200 transition-all">
                                        <div>
                                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Carbohidrato</p>
                                            <p class="font-bold text-slate-700 group-hover:text-emerald-600 transition-colors">${michelleMeal.carb.name}</p>
                                        </div>
                                        <div class="text-3xl font-black text-emerald-500">${michelleMeal.carb.qty}<span class="text-sm font-bold ml-1">g</span></div>
                                    </div>
                                    ${michelleMeal.extra ? `
                                    <div class="flex justify-between items-center p-4 bg-indigo-50/30 rounded-2xl border border-indigo-100">
                                        <div>
                                            <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1">Acompañamiento</p>
                                            <p class="font-bold text-slate-600">${michelleMeal.extra.name}</p>
                                        </div>
                                        <div class="text-2xl font-bold text-indigo-500">${michelleMeal.extra.qty}<span class="text-sm font-bold ml-1">g</span></div>
                                    </div>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += mealCard;
            });
        }

        function updateAll() {
            renderMeals();
        }

        window.onload = renderMeals;
    </script>
</body>
</html>
